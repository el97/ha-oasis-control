---
name: "Bug report"
description: "Report a bug with the custom integration"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Before you open a new issue, search through the existing issues (open and closed) to see if others have had the same problem.

  - type: checkboxes
    attributes:
      label: "Device type(s)"
      description: "Select all Oasis device types affected by this issue."
      options:
        - label: Oasis Mini
        - label: Side Table
        - label: Coffee Table
        - label: Other (specify below)
    validations:
      required: true

  - type: input
    attributes:
      label: "If 'Other' is selected, specify device type(s)"
      description: "Provide the exact model name(s) if you selected 'Other' above."
    validations:
      required: false

  - type: input
    attributes:
      label: "Oasis firmware version(s)"
      description: "Enter the firmware version shown in the Oasis app or device settings. If reporting multiple devices with different versions, list each one."
      placeholder: "Example: 2.80 (Mini), 1.50 (Side Table)"
    validations:
      required: true

  - type: input
    attributes:
      label: "Home Assistant version"
      description: "The version of Home Assistant you are using"
      placeholder: "Example: 2026.3.0"
    validations:
      required: true

  - type: input
    attributes:
      label: "Integration version"
      description: "The version of this custom integration you are using. If you are not running the [latest version](https://github.com/natekspencer/ha-oasis-control/releases/latest), stop, update, and then continue if the issue persists. Issues not pertaining to the latest release will be closed."
      placeholder: "Example: 2.2.2"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "System Health details"
      description: "Paste the data from the System Health card in Home Assistant (https://www.home-assistant.io/more-info/system-health#github-issues)"
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have enabled debug logging for my installation.
          required: true
        - label: I have filled out the issue template to the best of my ability.
          required: true
        - label: This issue only contains 1 issue (if you have multiple issues, open one issue for each issue).
          required: true
        - label: This issue is not a duplicate issue of any [previous issues](https://github.com/natekspencer/ha-oasis-control/issues?q=is%3Aissue+).
          required: true

  - type: textarea
    attributes:
      label: "Describe the issue"
      description: "If multiple devices are selected, clarify whether the issue affects all devices or only specific ones."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Reproduction steps
      description: "Without steps to reproduce, it will be hard to fix. It is very important that you fill out this part. Issues without it will be closed."
      value: |
        1.
        2.
        3.
        ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Debug logs"
      description: "To enable debug logs check this https://www.home-assistant.io/integrations/logger/, this **needs** to include _everything_ from startup of Home Assistant to the point where you encounter the issue."
      render: text
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Diagnostics dump"
      description: "Drag the diagnostics dump file here. (see https://www.home-assistant.io/integrations/diagnostics/ for info)"
    validations:
      required: false
